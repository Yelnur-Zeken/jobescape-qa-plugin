# Channel-specific rules. Loaded by qa-upsell skill before each run.

solidgate:
  description: |
    Default Solidgate processor. Most reliable for automation —
    one-click charge of the saved card from registration.
  cards:
    success: "4242424242424242"
    decline_subsequent: "4123212486997559"
    # 4123 is the "succeeds first charge, declines on subsequent" test card.
    # Used for check_decline: register with 4123 at funnel checkout (first
    # charge succeeds → user reaches upsell), then upsell click attempts to
    # recharge same card → declines → unsuccessful_purchase event fires.
  mechanic: one_click
  automation_status: supported
  funnel_url_param: "?paywall=solidgate"
  iframe_selector: 'iframe[name="solid-payment-form-iframe"]'
  notes:
    - Card 4242 always succeeds.
    - Card 4123 succeeds on funnel registration but declines on upsell recharge.
    - Tool already supports this channel end-to-end.

primer:
  description: |
    Primer is an alternative payment-orchestration layer. Available as a
    co-channel on many versions (u15.0.1, u15.4.3, etc).
  cards:
    success: "4242424242424242"     # confirmed empirically 2026-04-30
    decline_subsequent: TBD_RECON   # likely the same 4123… as Solidgate; not yet verified
  mechanic: one_click
  funnel_url_param: "?paywall=primer"
  automation_status: supported
  pricing_note: |
    Empirically Primer-channel upsells often show ~30-40% higher prices
    vs the Solidgate variant of the same version (per Yelnur).
  notes:
    - Executor supports --paywall primer end-to-end with --scenario check_works.
    - Flow shape (different from Solidgate's inline iframe):
      1. Click GET MY PLAN on selling page
      2. A "Complete Payment" button appears on the page
      3. Click it → a [role=dialog] modal opens with the Primer hosted form
      4. Modal contains 3 separate iframes (one each for card / expiry / CVV)
         with localised titles: "Номер карты" / "Срок действия (ММ/ГГ)" / "CVV"
         (ru) or "Card Number" / "Expiration Date" / "CVV" (en)
      5. Submit button inside the modal is also "Complete Payment"
    - Verified 2026-04-30: 4242 success card processes successfully on Primer
      and lands the user on /auth/register, identical handoff to Solidgate.

paypal:
  description: |
    PayPal-channel upsells. NO URL flag is required — the upsell version
    itself (u15.1.1, u15.1.2, u15.1.3, u13.0.1, u15.3.1, u1.1.3_claude)
    is server-side designated for PayPal cohort and renders its own
    purchase-mechanic UI on the upsell page. To QA one of these versions:
    walk the funnel normally via Solidgate (4242 card), then navigate to
    the upsell URL with `?upsell_version=u15.1.x`. The PayPal mechanic is
    entirely expressed in the upsell page itself.
  mechanics:
    - double_confirmation       # u15.1.x family — click → "Confirm your payment" popup → click in popup
    - scroll_gated_one_click    # u1.1.3_claude — verified end-to-end 2026-04-30. First click on
                                # "Confirm Payment" scrolls the page to the price + disclaimer
                                # block (~1000px down on stage). NO purchase events fire on the
                                # first click. Second click (or any click after the user has
                                # already scrolled past the price) acts as plain one_click and
                                # fires purchase_click + successful_purchase. The intent of
                                # the gate is legal/UX — user must see the $-amount + the
                                # "you agree to be charged $X" disclaimer before paying.
  mechanic: double_confirmation  # legacy field — deprecated, use `mechanics` list

  # How the executor handles each PayPal mechanic (as of 2026-04-30):
  #   double_confirmation      — supported. doBuy() clicks the page-level
  #                              Confirm Payment, waits for payment_intent_click
  #                              event + [role=dialog] popup, then clicks the
  #                              popup's Confirm Payment.
  #   scroll_gated_one_click   — supported. doBuy() calls scrollPriceIntoView()
  #                              before clickBuyButton() to satisfy the gate,
  #                              then runs the standard one_click flow.
  #                              IMPORTANT: this BYPASSES the scroll-gesture
  #                              path — it does not validate that the FIRST
  #                              unaided click actually scrolls. To verify
  #                              scroll-gesture behavior empirically, run
  #                              src/probes/scroll-gate-claude.ts.
  executor_handlers:
    double_confirmation: { handler: "doBuy(double_confirmation)", verified_on: ["u15.1.3"] }
    scroll_gated_one_click: { handler: "doBuy(scroll_gated_one_click)", verified_on: ["u1.1.3_claude"], probe_script: "src/probes/scroll-gate-claude.ts" }
  stage_limitations:
    decline_flow_validation: |
      ⚠️ PayPal decline-event validation runs on PROD ONLY — on stage the
      pr_webapp_upsell_unsuccessful_purchase event tied to PayPal cohort
      does NOT fire / is NOT checked the way it does in production. Any
      stage-side `--paywall paypal` + 4123 (or equivalent decline-card)
      run will exhibit Solidgate-style decline behavior, not the actual
      PayPal-cohort decline path. Don't draw conclusions about PayPal
      decline from stage runs. Verify PayPal decline behavior on prod.
  cards:
    funnel: "4242424242424242"   # funnel pays via Solidgate iframe regardless
    note: |
      "PayPal-ness" is in the upsell version's mechanic + UI, not in card
      input. The funnel uses Solidgate cards (4242 success / 4123 decline)
      regardless of which upsell version you'll target afterwards.
  funnel_url_param: null   # not needed — pass --paywall solidgate (default)
  automation_status: supported
  notes:
    - "Verified empirically 2026-04-30 on u15.1.3:"
    - "  Walk funnel via Solidgate (no paypal flag), register, then go to"
    - "  /additional_offer?upsell_version=u15.1.3 — the upsell page renders"
    - "  in double_confirmation mode automatically."
    - "  On click 'Confirm Payment' on the upsell page:"
    - "    1) pr_webapp_upsell_payment_intent_click fires"
    - "    2) 'Confirm your payment' popup opens with summary + another"
    - "       Confirm Payment button"
    - "  On click of the popup's Confirm Payment:"
    - "    3) pr_webapp_upsell_purchase_click fires"
    - "    4) pr_webapp_upsell_successful_purchase fires"
    - "  (Original spec said `purchase_intent_click` but actual event is"
    - "  `payment_intent_click`.)"
    - "Decline scenario: independent of channel — append &paywall=solidgate"
    - "to the upsell URL and use 4123 in the funnel. Works on PayPal-version"
    - "upsells too (u15.1.x decline path is the standard solidgate flow)."
    - "u15.1.1 returned 'UH OH... technical difficulties' in our test —"
    - "investigate version-specific access rules; u15.1.3 is a safer proxy"
    - "for verifying the double_confirmation mechanic."
  cli_flag_note: |
    The --paywall paypal CLI flag exists for clarity but is functionally
    an ALIAS for --paywall solidgate at the funnel step (PayPal-flagged
    versions don't need URL routing). Either flag works; the version
    determines the mechanic via UPSELL_META[version].mechanic.
