# Channel-specific rules. Loaded by qa-upsell skill before each run.

solidgate:
  description: |
    Default Solidgate processor. Most reliable for automation —
    one-click charge of the saved card from registration.
  cards:
    success: "4242424242424242"
    decline_subsequent: "4123212486997559"
    # 4123 is the "succeeds first charge, declines on subsequent" test card.
    # Used for check_decline: register with 4123 at funnel checkout (first
    # charge succeeds → user reaches upsell), then upsell click attempts to
    # recharge same card → declines → unsuccessful_purchase event fires.
  mechanic: one_click
  automation_status: supported
  funnel_url_param: "?paywall=solidgate"
  iframe_selector: 'iframe[name="solid-payment-form-iframe"]'
  notes:
    - Card 4242 always succeeds.
    - Card 4123 succeeds on funnel registration but declines on upsell recharge.
    - Tool already supports this channel end-to-end.

primer:
  description: |
    Primer is an alternative payment-orchestration layer. Sometimes
    served instead of Solidgate based on funnel A/B test routing.
  cards:
    success: TBD_RECON_NEEDED
    decline_subsequent: TBD_RECON_NEEDED
  mechanic: one_click
  funnel_url_param: "?paywall=primer"
  automation_status: needs_iframe_recon
  pricing_note: |
    Empirically Primer-channel upsells often show ~30-40% higher prices
    vs the Solidgate variant of the same version (per Yelnur).
  notes:
    - Executor supports --paywall primer (the URL flag works); the funnel
      walker reaches the Primer iframe step.
    - Primer iframe is at https://sdk.primer.io/web/hosted-pages/... — has
      its own field structure (different from Solidgate). Walker needs a
      Primer-specific iframe filler.
    - First step: run --paywall primer once to capture the iframe DOM, then
      add the field selectors.

paypal:
  description: |
    PayPal channel. Available on PayPal-only versions (u15.1.1, u15.1.2,
    u13.0.1, u15.3.1) and as a co-channel on others.
  mechanic: double_confirmation
  cards:
    note: PayPal flow uses sandbox account login, not card input.
  funnel_url_param: "?paywall=paypal"
  automation_status: needs_walker_extension
  notes:
    - Executor supports --paywall paypal (URL flag works) but walker needs
      a double_confirmation handler: after first buy click, a popup/scroll
      reveals a second confirm CTA — the walker has to find and click it.
    - Sandbox login: PayPal staging accepts test PayPal accounts; need to
      confirm Jobescape's sandbox setup (test PayPal email/password).
    - Once double_confirmation is wired + sandbox creds are known, all
      PayPal-only upsells become fully automatable.
    - Until then: --scenario check_ui + --paywall paypal works (just verifies
      the PayPal flow page renders); check_works requires the walker.
