# Channel-specific rules. Loaded by qa-upsell skill before each run.

solidgate:
  description: |
    Default Solidgate processor. Most reliable for automation —
    one-click charge of the saved card from registration.
  cards:
    success: "4242424242424242"
    decline_subsequent: "4123212486997559"
    # 4123 is the "succeeds first charge, declines on subsequent" test card.
    # Used for check_decline: register with 4123 at funnel checkout (first
    # charge succeeds → user reaches upsell), then upsell click attempts to
    # recharge same card → declines → unsuccessful_purchase event fires.
  mechanic: one_click
  automation_status: supported
  funnel_url_param: "?paywall=solidgate"
  iframe_selector: 'iframe[name="solid-payment-form-iframe"]'
  notes:
    - Card 4242 always succeeds.
    - Card 4123 succeeds on funnel registration but declines on upsell recharge.
    - Tool already supports this channel end-to-end.

primer:
  description: |
    Primer is an alternative payment-orchestration layer. Available as a
    co-channel on many versions (u15.0.1, u15.4.3, etc).
  cards:
    success: "4242424242424242"     # confirmed empirically 2026-04-30
    decline_subsequent: TBD_RECON   # likely the same 4123… as Solidgate; not yet verified
  mechanic: one_click
  funnel_url_param: "?paywall=primer"
  automation_status: supported
  pricing_note: |
    Empirically Primer-channel upsells often show ~30-40% higher prices
    vs the Solidgate variant of the same version (per Yelnur).
  notes:
    - Executor supports --paywall primer end-to-end with --scenario check_works.
    - Flow shape (different from Solidgate's inline iframe):
      1. Click GET MY PLAN on selling page
      2. A "Complete Payment" button appears on the page
      3. Click it → a [role=dialog] modal opens with the Primer hosted form
      4. Modal contains 3 separate iframes (one each for card / expiry / CVV)
         with localised titles: "Номер карты" / "Срок действия (ММ/ГГ)" / "CVV"
         (ru) or "Card Number" / "Expiration Date" / "CVV" (en)
      5. Submit button inside the modal is also "Complete Payment"
    - Verified 2026-04-30: 4242 success card processes successfully on Primer
      and lands the user on /auth/register, identical handoff to Solidgate.

paypal:
  description: |
    PayPal channel. Available on PayPal-only versions (u15.1.1, u15.1.2,
    u13.0.1, u15.3.1) and as a co-channel on others (per xlsx).
  mechanic: double_confirmation
  cards:
    note: True PayPal flow uses sandbox account login, not card input.
  funnel_url_param: "?paywall=paypal"
  automation_status: needs_funnel_investigation
  notes:
    - ⚠️ DISCOVERY 2026-04-30 — `?paywall=paypal` on the chat-v3/email funnel
      DOES NOT route to a real PayPal flow. The funnel falls back to the
      same Solidgate iframe (`#solid-payment-form-iframe`) and "Confirm
      Payment" CTA as the default solidgate paywall. So `--paywall paypal`
      in the executor today behaves identically to `--paywall solidgate`.
    - To test the real PayPal flow we likely need: a different funnel entry
      URL, a specific UTM/cohort that triggers PayPal A/B routing, or a
      version that's PayPal-only (u15.1.1, u15.1.2, u13.0.1, u15.3.1) which
      may force PayPal regardless of paywall flag — needs verification.
    - When real PayPal flow is reached, expected mechanic is double_confirmation
      (popup/scroll → second confirm) + PayPal sandbox account login. Walker
      will need both pieces.
    - Recommended next step: ask Yelnur how QA team currently tests PayPal-
      only versions manually, mirror that entry URL/setup in the executor.
